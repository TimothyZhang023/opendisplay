name: Windows receiver

on:
  pull_request:
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'
  push:
    branches:
      - main
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore receiver
        run: dotnet restore Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -r win-x64
      - name: Build receiver
        id: build_receiver
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          dotnet build Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -c Release -r win-x64 --no-restore *> build\windows-build.log
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
          Get-Content build\windows-build.log
          exit 0
      - name: Upload build log on failure
        if: steps.build_receiver.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplayReceiver-build-log
          path: build/windows-build.log
      - name: Fail if receiver did not build
        if: steps.build_receiver.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
      - name: Publish self-contained receiver exe
        run: dotnet publish Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o build/windows-receiver
      - name: Bundle ffplay runtime
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $publish = "build\windows-receiver"
          $ffplay = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg" -Recurse -Filter ffplay.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ffplay) {
            $ffplay = Get-Item (Get-Command ffplay.exe -ErrorAction Stop).Source
          }
          Copy-Item $ffplay.FullName "$publish\ffplay.exe" -Force
          $ffmpegBin = Split-Path -Parent $ffplay.FullName
          Get-ChildItem $ffmpegBin -Filter *.dll -ErrorAction SilentlyContinue | Copy-Item -Destination $publish -Force
          Get-ChildItem $ffmpegBin -Filter *license* -ErrorAction SilentlyContinue | Copy-Item -Destination $publish -Force
      - name: Package receiver
        shell: pwsh
        run: |
          Copy-Item Windows\OpenDisplayReceiver\README.md build\windows-receiver\README.md
          Compress-Archive -Path build\windows-receiver\* -DestinationPath build\OpenDisplayReceiver-win-x64.zip -Force
      - name: Upload receiver artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplayReceiver-win-x64
          path: build/OpenDisplayReceiver-win-x64.zip

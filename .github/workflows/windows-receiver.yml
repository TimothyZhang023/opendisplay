name: Windows receiver

on:
  pull_request:
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'
  push:
    branches:
      - main
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build receiver
        run: dotnet build Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -c Release

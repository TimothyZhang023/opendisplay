name: Windows receiver

on:
  pull_request:
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'
  push:
    branches:
      - main
    paths:
      - 'Windows/OpenDisplayReceiver/**'
      - '.github/workflows/windows-receiver.yml'

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore receiver
        run: dotnet restore Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -r win-x64
      - name: Build receiver
        id: build_receiver
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmd /c "dotnet build Windows\OpenDisplayReceiver\OpenDisplayReceiver.csproj -c Release -r win-x64 --no-restore > build\windows-build.log 2>&1"
          $exitCode = $LASTEXITCODE
          if ($exitCode -eq 0) {
            "build_failed=false" >> $env:GITHUB_OUTPUT
          } else {
            "build_failed=true" >> $env:GITHUB_OUTPUT
          }
          Get-Content build\windows-build.log
          exit 0
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplayReceiver-build-log
          path: build/windows-build.log
      - name: Fail if receiver did not build
        if: steps.build_receiver.outputs.build_failed == 'true'
        shell: pwsh
        run: exit 1
      - name: Publish self-contained receiver exe
        run: dotnet publish Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o build/windows-receiver
      - name: Publish debug receiver package
        run: dotnet publish Windows/OpenDisplayReceiver/OpenDisplayReceiver.csproj -c Debug -r win-x64 --self-contained true -p:PublishSingleFile=false -p:DebugType=portable -p:DebugSymbols=true -o build/windows-receiver-debug
      - name: Bundle ffplay runtime
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $publishDirs = @("build\windows-receiver", "build\windows-receiver-debug")
          $ffplay = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg" -Recurse -Filter ffplay.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ffplay) {
            $ffplay = Get-Item (Get-Command ffplay.exe -ErrorAction Stop).Source
          }
          $ffmpegBin = Split-Path -Parent $ffplay.FullName
          foreach ($publish in $publishDirs) {
            Copy-Item $ffplay.FullName "$publish\ffplay.exe" -Force
            Get-ChildItem $ffmpegBin -Filter *.dll -ErrorAction SilentlyContinue | Copy-Item -Destination $publish -Force
            Get-ChildItem $ffmpegBin -Filter *license* -ErrorAction SilentlyContinue | Copy-Item -Destination $publish -Force
          }
      - name: Package receiver
        shell: pwsh
        run: |
          Copy-Item Windows\OpenDisplayReceiver\README.md build\windows-receiver\README.md
          Copy-Item Windows\OpenDisplayReceiver\DEBUGGING.md build\windows-receiver\DEBUGGING.md
          Compress-Archive -Path build\windows-receiver\* -DestinationPath build\OpenDisplayReceiver-win-x64.zip -Force
      - name: Package debug receiver
        shell: pwsh
        run: |
          Copy-Item Windows\OpenDisplayReceiver\README.md build\windows-receiver-debug\README.md
          Copy-Item Windows\OpenDisplayReceiver\DEBUGGING.md build\windows-receiver-debug\DEBUGGING.md
          @'
          OpenDisplay Receiver Debug Package

          This package is built with Debug configuration and includes portable .pdb files.
          Use this package when the Windows receiver crashes or exits unexpectedly.

          Logs are written to:
            %LOCALAPPDATA%\OpenDisplayReceiver\Logs\latest.log

          To force the external fallback renderer while debugging:
            OpenDisplayReceiver.exe --renderer ffplay --windowed
          '@ | Set-Content build\windows-receiver-debug\DEBUG_README.txt -Encoding UTF8
          Compress-Archive -Path build\windows-receiver-debug\* -DestinationPath build\OpenDisplayReceiver-win-x64-debug.zip -Force
      - name: Upload receiver artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplayReceiver-win-x64
          path: build/OpenDisplayReceiver-win-x64.zip
      - name: Upload debug receiver artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplayReceiver-win-x64-debug
          path: build/OpenDisplayReceiver-win-x64-debug.zip
